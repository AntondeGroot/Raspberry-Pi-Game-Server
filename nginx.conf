# JSON access log so the admin "Ops · Error Logs" page can parse HTTP 4xx/5xx
# reliably (no fragile regex over the default combined format). Valid here because
# sites-enabled/* is included inside nginx's http{} context.
log_format json_combined escape=json '{'
    '"time":"$time_iso8601",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status'
'}';

server {
    listen 80;
    access_log /var/log/nginx/access.log json_combined;

    # Cloudflare Tunnel connects to nginx over plain HTTP, so $scheme is always
    # "http" here. Using $scheme would overwrite the "X-Forwarded-Proto: https"
    # that Cloudflare already set, causing Spring Boot to think the connection is
    # insecure and skip the Secure flag on cookies. Forwarding the incoming header
    # instead preserves the original protocol seen by the client.

    # GameRoom Server-Sent Events streams (lobby / room / chat).
    # SSE must NOT be buffered: with nginx's default proxy_buffering the upstream
    # events are held in nginx's buffer and only flushed once it fills or the
    # connection closes, so clients see room/game updates (e.g. the redirect when a
    # game starts) arrive late or not at all. Disable buffering and use a keep-alive
    # HTTP/1.1 upstream connection so events stream through immediately.
    location ~ ^/(lobby/stream|rooms/[^/]+/stream|chat/[^/]+/stream)$ {
        proxy_pass http://localhost:4100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # proxy_http_version only controls the nginx->backend hop (here: localhost:4100),
        # and nginx accepts just two values: 1.0 (default) and 1.1 — there is no HTTP/2
        # or HTTP/3 option for proxy_pass upstreams. 1.0 has no persistent connections or
        # proper chunked streaming, so nginx buffers the whole response, which kills SSE.
        # 1.1 enables chunked transfer + keep-alive so events stream through incrementally
        # (and is required if we ever add an upstream{} keepalive pool). The client-facing
        # protocol is independent of this — browsers/Cloudflare can still use HTTP/2 or 3.
        # Clearing the Connection header lets that keep-alive upstream connection stay open.
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # GameRoom lobby
    location / {
        proxy_pass http://localhost:4100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Keezenspel frontend — strip /keezen prefix before forwarding
    location /keezen/ {
        proxy_pass http://localhost:4200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Qwixx — strip /qwixx prefix before forwarding
    location /qwixx/ {
        proxy_pass http://localhost:4300/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}