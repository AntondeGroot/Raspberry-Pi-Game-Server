# Profile picture sprite-sheet configuration.
#
# Indices are 1-based (picture 1 = top-left, counting left-to-right then top-to-bottom).
#
# Per sheet you can specify either:
#   exclude:      [1, 5, 9]   — hide these pictures, show everything else
#   only-include: [1, 2, 3]   — show only these pictures, hide everything else
# (If both are given, only-include takes precedence.)
#
# inset-px: pixels cropped from each edge of a cell to remove borders / bleed.

sprite-sheets:
  sheets:
    - url: /profilepics.png
      cols: 4
      rows: 4
      img-width: 1024
      img-height: 1024
      inset-px: 6
      exclude: [6, 9, 10, 13, 15]

    - url: /profilepics2.png
      cols: 4
      rows: 4
      img-width: 1024
      img-height: 984
      inset-px: 9
      exclude: [15]

    - url: /profilepics3.png
      cols: 5
      rows: 3
      img-width: 1520
      img-height: 916
      inset-px: 10
      exclude: [4, 5, 6]

    - url: /profilepics4.png
      cols: 4
      rows: 4
      img-width: 1024
      img-height: 1024
      inset-px: 6
      exclude: [2, 3, 4, 8, 9, 14]

    - url: /robots.png
      cols: 4
      rows: 4
      img-width: 1254
      img-height: 1254
      inset-px: 4
      exclude: [10, 14]
      bot-only: true