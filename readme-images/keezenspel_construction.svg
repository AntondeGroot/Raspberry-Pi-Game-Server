round the centre</text><rect x="840" y="150" width="372" height="540" rx="18" fill="#0b1430" fill-opacity="0.78" stroke="#3a4b7e" stroke-width="1.5"/><text x="866.0" y="196.0" fill="#ffffff" font-size="23" font-weight="800" text-anchor="start">Construction rules</text><text x="864" y="236" fill="#ffffff" font-size="19" font-weight="800">D</text><text x="922" y="236" fill="#cdd6ee" font-size="14.5" font-weight="500">spacing between adjacent cells</text><text x="864" y="266" fill="#ffb15e" font-size="19" font-weight="800">OL</text><text x="922" y="266" fill="#cdd6ee" font-size="14.5" font-weight="500">orange line = 2D</text><text x="864" y="296" fill="#ffd34d" font-size="19" font-weight="800">α</text><text x="922" y="296" fill="#cdd6ee" font-size="14.5" font-weight="500">alpha = 90° − 180°/n</text><text x="864" y="326" fill="#f08af0" font-size="19" font-weight="800">PL</text><text x="922" y="326" fill="#cdd6ee" font-size="14.5" font-weight="500">purple line = tan(α) · OL</text><line x1="864" y1="358" x2="1188" y2="358" stroke="#3a4b7e" stroke-width="1.2"/><text x="864.0" y="392.0" fill="#ffffff" font-size="18" font-weight="800" text-anchor="start">Example  (n = 6)</text><text x="864" y="422" fill="#cdd6ee" font-size="16" font-weight="600">α = 90° − 180°/6 = 60°</text><text x="864" y="450" fill="#cdd6ee" font-size="16" font-weight="600">OL = 2D</text><text x="864" y="478" fill="#cdd6ee" font-size="16" font-weight="600">PL = tan(60°)·OL = 1.732 · 2D</text><text x="864" y="506" fill="#cdd6ee" font-size="16" font-weight="600">PL ≈ 3.46 D</text><text x="864" y="540" fill="#9aa7cd" font-size="13.5" font-weight="500">The start point of one section lines up</text><text x="864" y="560" fill="#9aa7cd" font-size="13.5" font-weight="500">with the end of the previous one, so the</text><text x="864" y="580" fill="#9aa7cd" font-size="13.5" font-weight="500">sections tile into an n-pointed board.</text></svg>