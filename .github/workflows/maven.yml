name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Builds all modules (including GWT client compilation) and runs every test
      # except the browser-based E2E suite. Using `install` so GameRoom-client.war
      # lands in the local Maven repo and is available for the E2E step below.
      - name: Build and run unit + integration tests
        run: mvn -B clean install -DexcludedGroups=e2e

      # ubuntu-latest has Google Chrome pre-installed; Selenium Manager (bundled in
      # selenium-java 4.6+) automatically downloads the matching ChromeDriver.
      - name: Run E2E tests
        run: mvn test -pl GameRoom-server -Dgroups=e2e